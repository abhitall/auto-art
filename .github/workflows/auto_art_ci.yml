name: Auto-ART CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run ruff check auto_art/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Phase 1 — Attack wrapper tests
        run: |
          uv run pytest tests/unit/test_evasion_attack_wrapper.py \
                        tests/unit/test_extraction_attack_wrapper.py \
                        tests/unit/test_inference_attack_wrapper.py \
                        tests/unit/test_poisoning_attack_wrapper.py \
                        tests/unit/test_llm_attack_wrapper.py \
                        tests/unit/test_blackbox_attacks.py \
                        -v --tb=short
        continue-on-error: true

      - name: Phase 2 — Defence tests
        run: |
          uv run pytest tests/unit/test_input_sanitizer.py \
                        tests/unit/test_rag_poisoning_detector.py \
                        tests/unit/test_in_context_defence.py \
                        tests/unit/test_circuit_breaker.py \
                        tests/unit/test_preprocessor_defences.py \
                        tests/unit/test_postprocessor_defences.py \
                        tests/unit/test_trainer_defence.py \
                        tests/unit/test_poison_detectors.py \
                        -v --tb=short

      - name: Phase 3 — Agentic & telemetry tests
        run: |
          uv run pytest tests/unit/test_agentic_attacks.py \
                        tests/unit/test_red_team.py \
                        tests/unit/test_guardrails.py \
                        tests/unit/test_agent_tracer.py \
                        tests/unit/test_certification.py \
                        -v --tb=short

      - name: Phase 4 — Full test suite
        run: uv run pytest tests/ -v --tb=short --cov=auto_art --cov-report=xml

      - name: Phase 5 — Deployment gate
        run: |
          uv run python -c "
          from auto_art.core.evaluation.attacks.agentic import AdvWebDOMAttack, AgentPoisonRAGAttack

          class SafeTestAgent:
              def process(self, x):
                  return 'Task completed normally.'

          agent = SafeTestAgent()
          env = {'html': '<html><body></body></html>', 'memory': []}

          dom = AdvWebDOMAttack(max_injections=3)
          assert dom.execute_agentic(agent=agent, environment=env).success_rate < 0.05

          rag = AgentPoisonRAGAttack(num_poison_entries=3)
          assert rag.execute_agentic(agent=agent, environment=env).success_rate < 0.05

          print('Deployment gate PASSED')
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
