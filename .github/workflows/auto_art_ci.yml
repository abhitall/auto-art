name: AutoART CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install .

    - name: Lint with Flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=12 --max-line-length=99 --statistics

    # Phase 1: Static Attack Tests (existing)
    - name: "Phase 1: Static Attack Tests"
      run: |
        pytest tests/unit/test_evasion_attack_wrapper.py \
               tests/unit/test_extraction_attack_wrapper.py \
               tests/unit/test_inference_attack_wrapper.py \
               tests/unit/test_poisoning_attack_wrapper.py \
               tests/unit/test_llm_attack_wrapper.py \
               -v --tb=short
      continue-on-error: true

    # Phase 2: Agentic Defence Tests (new)
    - name: "Phase 2: Agentic Defence Tests"
      run: |
        pytest tests/unit/test_input_sanitizer.py \
               tests/unit/test_rag_poisoning_detector.py \
               tests/unit/test_in_context_defence.py \
               tests/unit/test_circuit_breaker.py \
               tests/unit/test_preprocessor_defences.py \
               tests/unit/test_postprocessor_defences.py \
               tests/unit/test_trainer_defence.py \
               tests/unit/test_poison_detectors.py \
               -v --tb=short

    # Phase 3: Dynamic Agentic Attack Tests (new)
    - name: "Phase 3: Dynamic Agentic Attack Tests"
      run: |
        pytest tests/unit/test_agentic_attacks.py \
               tests/unit/test_red_team.py \
               tests/unit/test_guardrails.py \
               tests/unit/test_agent_tracer.py \
               tests/unit/test_blackbox_attacks.py \
               tests/unit/test_certification.py \
               -v --tb=short

    # Phase 4: Full Test Suite
    - name: "Phase 4: Full Test Suite"
      run: pytest tests/ -v --tb=short

    # Phase 5: Deployment Gate
    - name: "Phase 5: Deployment Gate - Agentic Resilience Check"
      run: |
        python -c "
        from auto_art.core.evaluation.attacks.agentic import AdvWebDOMAttack, AgentPoisonRAGAttack

        class SafeTestAgent:
            def process(self, x):
                return 'Task completed normally.'

        agent = SafeTestAgent()
        env = {'html': '<html><body></body></html>', 'memory': []}

        dom = AdvWebDOMAttack(max_injections=3)
        dom_result = dom.execute_agentic(agent=agent, environment=env)
        assert dom_result.success_rate < 0.05, f'DOM attack gate failed: {dom_result.success_rate}'

        rag = AgentPoisonRAGAttack(num_poison_entries=3)
        rag_result = rag.execute_agentic(agent=agent, environment=env)
        assert rag_result.success_rate < 0.05, f'RAG attack gate failed: {rag_result.success_rate}'

        print('Deployment gate PASSED: All agentic resilience checks passed.')
        "
